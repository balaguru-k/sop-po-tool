version: '3.8'
services:
  mongo:
    image: mongo:7.0
    container_name: sop-po-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sop-po-backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/sop_po_tool
      SERVER_PORT: 8404
      PATH_FILEBASEPATH: /app/uploads
    ports:
      - "8404:8404"
    volumes:
      - backend-uploads:/app/uploads

  frontend:
    build:
      context: ../sop-po-tool
      dockerfile: Dockerfile
    container_name: sop-po-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mongo-data:
  backend-uploads:
