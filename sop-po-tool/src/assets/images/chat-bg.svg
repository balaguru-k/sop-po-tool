<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf2f8"/>
      <stop offset="30%" stop-color="#ede9fe"/>
      <stop offset="60%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <radialGradient id="g1"><stop offset="0%" stop-color="#f9a8d4" stop-opacity="0.3"/><stop offset="100%" stop-color="#f9a8d4" stop-opacity="0"/></radialGradient>
    <radialGradient id="g2"><stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.25"/><stop offset="100%" stop-color="#c4b5fd" stop-opacity="0"/></radialGradient>
    <radialGradient id="g3"><stop offset="0%" stop-color="#93c5fd" stop-opacity="0.2"/><stop offset="100%" stop-color="#93c5fd" stop-opacity="0"/></radialGradient>
    <radialGradient id="g4"><stop offset="0%" stop-color="#fda4af" stop-opacity="0.2"/><stop offset="100%" stop-color="#fda4af" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="400" height="600" fill="url(#bg)"/>
  <!-- Floating orbs -->
  <circle cx="60" cy="100" r="80" fill="url(#g1)">
    <animate attributeName="cx" values="60;140;60" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="100;180;100" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="200" r="100" fill="url(#g2)">
    <animate attributeName="cx" values="320;240;320" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="200;300;200" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="450" r="90" fill="url(#g3)">
    <animate attributeName="cx" values="200;280;200" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="450;370;450" dur="11s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="500" r="70" fill="url(#g4)">
    <animate attributeName="cx" values="100;180;100" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="500;420;500" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="80" r="60" fill="url(#g4)">
    <animate attributeName="cx" values="350;280;350" dur="11s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="80;150;80" dur="8s" repeatCount="indefinite"/>
  </circle>
  <!-- Sparkle dots -->
  <circle cx="80" cy="300" r="3" fill="#f9a8d4" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;4;2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="120" r="2.5" fill="#c4b5fd" opacity="0.4">
    <animate attributeName="opacity" values="0.1;0.6;0.1" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1.5;3.5;1.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="250" r="2" fill="#93c5fd" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1;3;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="400" r="3" fill="#fda4af" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;4;2" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="550" r="2" fill="#c4b5fd" opacity="0.3">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1.5;3;1.5" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="480" r="2.5" fill="#f9a8d4" opacity="0.4">
    <animate attributeName="opacity" values="0.1;0.7;0.1" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1;3.5;1" dur="4.5s" repeatCount="indefinite"/>
  </circle>
</svg>
